{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><span class="brand-mark"></span> Dashboard</div>
    <nav class="menu" id="menu">
      <a class="menu-item active" data-view="home">Home</a>
      <a class="menu-item" data-view="services">Services</a>
      <a class="menu-item" data-view="alerts">Alerts</a>
      <a class="menu-item" data-view="tasks">Tasks</a>
      <a class="menu-item" data-view="activity">Activity</a>
      <a class="menu-item" data-view="assistant">Assistant</a>
    </nav>
    <div class="sidebar-foot">Local · 127.0.0.1</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="page-title">Overview</h1>
        <p class="muted" id="page-sub">Your systems at a glance</p>
      </div>
      <button id="refresh" class="btn">Refresh</button>
    </header>

    <!-- HOME: widget grid -->
    <section class="view" id="view-home">
      <div class="widgets">
        <button class="widget" data-view="services">
          <div class="widget-label">Services</div>
          <div class="widget-value" data-w="services">–</div>
          <div class="widget-foot" id="w-services-foot">operational</div>
        </button>
        <button class="widget" data-view="alerts">
          <div class="widget-label">Alerts</div>
          <div class="widget-value" data-w="alerts">–</div>
          <div class="widget-foot">critical + warning</div>
        </button>
        <button class="widget" data-view="tasks">
          <div class="widget-label">Open Tasks</div>
          <div class="widget-value" data-w="tasks_open">–</div>
          <div class="widget-foot">to do</div>
        </button>
        <button class="widget" data-view="activity">
          <div class="widget-label">Activity</div>
          <div class="widget-value" data-w="activity">–</div>
          <div class="widget-foot">recent events</div>
        </button>
        <button class="widget accent" data-view="assistant">
          <div class="widget-label">Assistant</div>
          <div class="widget-value">Ask</div>
          <div class="widget-foot">local AI</div>
        </button>
      </div>
    </section>

    <!-- Detail views -->
    <section class="view hidden" id="view-services">
      <button class="back" data-view="home">&larr; Back</button>
      <div class="card"><div class="svc-grid" id="service-grid"></div></div>
    </section>

    <section class="view hidden" id="view-alerts">
      <button class="back" data-view="home">&larr; Back</button>
      <div class="card"><div class="rows" id="alerts-list"></div></div>
    </section>

    <section class="view hidden" id="view-tasks">
      <button class="back" data-view="home">&larr; Back</button>
      <div class="card">
        <form class="task-form" id="task-form">
          <input id="t-title" placeholder="New task…" autocomplete="off" required />
          <select id="t-priority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
          <input id="t-due" type="date" />
          <button class="btn" type="submit">Add</button>
        </form>
        <div class="task-list" id="task-list"></div>
      </div>
    </section>

    <section class="view hidden" id="view-activity">
      <button class="back" data-view="home">&larr; Back</button>
      <div class="card"><div class="rows" id="activity-list"></div></div>
    </section>

    <section class="view hidden" id="view-assistant">
      <button class="back" data-view="home">&larr; Back</button>
      <div class="card chat">
        <div class="chat-log" id="assistant-log">
          <div class="msg bot">Ask: "Check my systems", "Any problems?", "What should I work on today?"</div>
        </div>
        <form class="chat-form" id="assistant-form">
          <input id="assistant-input" placeholder="Ask the local assistant…" autocomplete="off" />
          <button class="btn" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
